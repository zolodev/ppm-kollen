<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#111620"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow" cx="30%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- Green glow right -->
    <radialGradient id="glow2" cx="80%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="clip">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Chart illustration — stylized candlestick / line chart -->
  <g opacity="0.18">
    <!-- Chart area background -->
    <rect x="620" y="80" width="520" height="340" rx="12" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Rising line path -->
    <polyline
      points="650,360 700,310 740,330 790,260 840,240 890,200 940,175 990,155 1040,130 1090,110 1110,108"
      fill="none"
      stroke="#10b981"
      stroke-width="2.5"
      stroke-opacity="0.9"
      stroke-linejoin="round"
      stroke-linecap="round"/>

    <!-- Area fill under line -->
    <polygon
      points="650,360 700,310 740,330 790,260 840,240 890,200 940,175 990,155 1040,130 1090,110 1110,108 1110,400 650,400"
      fill="url(#greenFill)"
      fill-opacity="0.15"/>

    <!-- Q10 band -->
    <polyline
      points="650,390 700,360 740,370 790,330 840,310 890,290 940,270 990,255 1040,230 1090,210 1110,205"
      fill="none"
      stroke="#60a5fa"
      stroke-width="1.5"
      stroke-opacity="0.4"
      stroke-dasharray="4,4"
      stroke-linejoin="round"/>

    <!-- Q90 band -->
    <polyline
      points="650,330 700,270 740,295 790,215 840,185 890,155 940,125 990,100 1040,90 1090,78 1110,75"
      fill="none"
      stroke="#60a5fa"
      stroke-width="1.5"
      stroke-opacity="0.4"
      stroke-dasharray="4,4"
      stroke-linejoin="round"/>

    <!-- Dots on main line -->
    <circle cx="700" cy="310" r="3.5" fill="#10b981" opacity="0.7"/>
    <circle cx="790" cy="260" r="3.5" fill="#10b981" opacity="0.7"/>
    <circle cx="890" cy="200" r="3.5" fill="#10b981" opacity="0.7"/>
    <circle cx="990" cy="155" r="3.5" fill="#10b981" opacity="0.7"/>
    <circle cx="1090" cy="110" r="5" fill="#10b981" opacity="1"/>

    <!-- Bar chart at bottom -->
    <rect x="660" y="370" width="18" height="35" rx="3" fill="#3b82f6" opacity="0.5"/>
    <rect x="690" y="355" width="18" height="50" rx="3" fill="#3b82f6" opacity="0.4"/>
    <rect x="720" y="362" width="18" height="43" rx="3" fill="#3b82f6" opacity="0.5"/>
    <rect x="750" y="345" width="18" height="60" rx="3" fill="#10b981" opacity="0.45"/>
    <rect x="780" y="338" width="18" height="67" rx="3" fill="#10b981" opacity="0.5"/>
    <rect x="810" y="330" width="18" height="75" rx="3" fill="#10b981" opacity="0.55"/>
  </g>

  <defs>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Logo mark box -->
  <rect x="64" y="64" width="52" height="52" rx="14" fill="#1e2d4a" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="1.5"/>
  <polyline
    points="78,104 90,91 98,97 112,82"
    fill="none" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="112" cy="82" r="2.5" fill="#60a5fa"/>

  <!-- Brand name -->
  <text x="130" y="97" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="600" fill="#f0f4ff" letter-spacing="-0.5">PPM Kollen</text>
  <text x="130" y="116" font-family="'Courier New', monospace" font-size="13" fill="#6b7fa8" letter-spacing="2">FUND FORECAST</text>

  <!-- Divider line -->
  <line x1="64" y1="145" x2="580" y2="145" stroke="#2a3654" stroke-width="1"/>

  <!-- Main headline -->
  <text x="64" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="600" fill="#e8eef8" letter-spacing="-1">Vilka fonder ger</text>
  <text x="64" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="600" fill="#60a5fa" letter-spacing="-1" font-style="italic">troligtvis</text>
  <text x="64" y="325" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="600" fill="#e8eef8" letter-spacing="-1">högst avkastning?</text>

  <!-- Subtext -->
  <text x="64" y="385" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#8899bb">AI-driven fondrankings baserade på ML-modellensemble.</text>
  <text x="64" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#8899bb">Uppdateras varje vecka — inte finansiell rådgivning.</text>

  <!-- Stat pills -->
  <rect x="64" y="455" width="160" height="42" rx="10" fill="#1e2d4a" stroke="#2a3a5e" stroke-width="1.5"/>
  <text x="144" y="472" font-family="'Courier New', monospace" font-size="11" fill="#6b7fa8" text-anchor="middle" letter-spacing="1">LSTM + TCN</text>
  <text x="144" y="488" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#93c5fd" text-anchor="middle">Modellensemble</text>

  <rect x="240" y="455" width="160" height="42" rx="10" fill="#1a2e1e" stroke="#1f4a2a" stroke-width="1.5"/>
  <text x="320" y="472" font-family="'Courier New', monospace" font-size="11" fill="#4a7a5a" text-anchor="middle" letter-spacing="1">Q10 · Q50 · Q90</text>
  <text x="320" y="488" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#6ee7b7" text-anchor="middle">Prognosintervall</text>

  <rect x="416" y="455" width="160" height="42" rx="10" fill="#2a1e1a" stroke="#4a2a1f" stroke-width="1.5"/>
  <text x="496" y="472" font-family="'Courier New', monospace" font-size="11" fill="#7a5a4a" text-anchor="middle" letter-spacing="1">1W · 4W · 13W · 26W</text>
  <text x="496" y="488" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#fca5a5" text-anchor="middle">Investeringshorisonter</text>

  <!-- Bottom URL bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#0d1117" fill-opacity="0.8"/>
  <text x="64" y="615" font-family="'Courier New', monospace" font-size="14" fill="#4a5a7a" letter-spacing="0.5">ppmkollen.se</text>

  <!-- BUY signal badge top right -->
  <rect x="1090" y="540" width="70" height="36" rx="8" fill="#0d2218" stroke="#10b981" stroke-width="1.5"/>
  <text x="1125" y="553" font-family="'Courier New', monospace" font-size="9" fill="#4a7a5a" text-anchor="middle" letter-spacing="1">SIGNAL</text>
  <text x="1125" y="568" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#10b981" text-anchor="middle">KÖP ▲</text>
</svg>
